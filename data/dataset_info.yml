# Dataset info card — generated by Publisher::InfoCard. Do not edit by hand.
# Diff two versions of this file to review a data-source refresh.
#
# source     = counts straight from the upstream files (POWO / UPOV / EUPVP).
# database   = counts in the built SQLite DB. Cumulative: the importer upserts
#              and never deletes, so rows from older sources can linger.
# published  = the subset that actually ships in the gem.
#
# reconciliation bridges source -> database for POWO, UPOV and EUPVP:
#   source_total                       rows/codes in the current source file
#     - dropped_with_issue             source rows we tried to import but rejected;
#                                       each is logged in import_issues (bad rank,
#                                       EUPVP cultivar with no matching taxon, etc.)
#     - skipped_not_importable         source rows we never turned into DB rows: they
#                                       fail a basic gate and are NOT logged as issues.
#                                       POWO: blank rank/name/id, unmapped status.
#                                       EUPVP: blank_denomination, plus
#                                       duplicate_denomination -- the same denomination
#                                       registered under one species by several countries
#                                       (we keep one row per species+denomination, since
#                                       we don't track the registering country).
#     = imported_from_source           source rows that became DB rows
#   residual                           source_total - imported - dropped - skipped;
#                                       must be 0 (every source row is accounted for)
#   imported_from_source
#     + retained_from_previous_versions  DB rows whose id is absent from THIS source —
#                                         carried over from an older release (drift logs
#                                         them as retired_taxon but never deletes them)
#     = database_total                 == database.<source>.total
#   other_issues                       import_issues from the latest run that are NOT
#                                       source-row drops, shown for completeness
#
# concordance.by_reason (old_uuid -> new_uuid redirects):
#   powo_id_change            POWO kept the name but reassigned its id (auto, via drift)
#   powo_adoption             a UPOV-only stub matched a newly-published POWO name
#   powo_synonym_to_accepted  a folded/dropped name redirected to POWO's current target
#   powo_autonym_to_parent    an autonym POWO folded into its parent -> redirect to parent
#   powo_retirement           binomial still Accepted under a different id -> new id
#   powo_typo_fix             a name corrected upstream (e.g. barreraense -> barrancense)
#   powo_reclassified         a taxon POWO emptied by reclassifying its members
#                             elsewhere (e.g. a family whose only genus moved, or which
#                             was merged) -> redirect to the surviving taxon
#   upov_remap                a UPOV code moved to a different taxon between releases
